<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 300px;
      padding: 14px;
    }

    h1 {
      font-size: 15px;
      margin: 0 0 10px;
    }

    h2 {
      font-size: 12px;
      color: #666;
      margin: 16px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    button {
      width: 100%;
      padding: 9px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #4F46E5;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }

    button:disabled {
      background: #c7c7c7;
      cursor: default;
    }

    .status {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
    }

    .history-item {
      font-size: 12px;
      background: #f4f4f5;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      word-break: break-word;
    }

    .history-item:hover {
      background: #e9e9ec;
    }

    .history-meta {
      color: #888;
      font-size: 10px;
      margin-top: 4px;
    }

    .empty {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>
  <h1>ClipSync</h1>
  <div id="status" class="status">Checking sign-in…</div>
  <button id="sendBtn" disabled>Send my clipboard →</button>

  <h2>Recent</h2>
  <div id="history"></div>

  <script src="popup.bundle.js"></script>
</body>

</html>
