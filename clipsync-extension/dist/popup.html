<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font-family: system-ui, sans-serif; width: 280px; padding: 14px; }
  h1 { font-size: 15px; margin: 0 0 10px; }
  button {
    width: 100%; padding: 9px; margin-top: 8px; border: none; border-radius: 6px;
    background: #4F46E5; color: white; font-size: 13px; cursor: pointer;
  }
  button:disabled { background: #c7c7c7; cursor: default; }
  .status { font-size: 12px; color: #555; margin-top: 6px; }
  .preview {
    font-size: 12px; background: #f4f4f5; border-radius: 6px; padding: 8px;
    margin-top: 10px; max-height: 60px; overflow: auto; word-break: break-word;
  }
</style>
</head>
<body>
  <h1>ClipSync</h1>
  <div id="status" class="status">Checking sign-in…</div>
  <div id="incoming"></div>
  <button id="sendBtn" disabled>Send my clipboard →</button>
  <script src="popup.bundle.js"></script>
</body>
</html>
